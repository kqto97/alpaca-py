name: Run Trading Strategy for NVDA

on:
  schedule:
    - cron: '59 13 * * 1-5'  # 8:59 AM ET
  workflow_dispatch: 

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
      ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
      ALPACA_URL: ${{ secrets.ALPACA_URL }}
      ALPACA_PAPER_TRADE: ${{ secrets.ALPACA_PAPER_TRADE }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.7

      - name: Set up Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r examples/stocks/build_trading_bot_with_ChatGPT/requirements.txt

      - name: Run Trading Strategy
        run: |
          python examples/stocks/build_trading_bot_with_ChatGPT/strategy.py --symbol "NVDA"

      - name: Display Trade Log
        if: always()
        run: |
          cat examples/stocks/build_trading_bot_with_ChatGPT/trade_log.txt || echo "No trade log found yet"

      - name: Commit Trade Log
        if: always()
        run: |
          git config --local user.name 'GitHub Action'
          git config --local user.email 'action@github.com'
          git add examples/stocks/build_trading_bot_with_ChatGPT/trade_log.txt || true
          git commit -m 'Update trade log' || echo 'No changes to commit'
          git push || true
